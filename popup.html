<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LLM Readiness Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- HERO -->
  <div class="hero">
    <div class="title">LLM Readiness</div>
    <div class="ring" id="ring"><span id="score">--</span></div>
    <div class="status" id="status"></div>
  </div>

  <!-- METRICS -->
  <div class="metrics">
    <div class="metric"><span>Markdown</span><b id="markdown"></b></div>
    <div class="metric"><span>Extractability</span><b id="extract"></b></div>
    <div class="metric"><span>Token</span><b id="token"></b></div>
    <div class="metric"><span>Conversion</span><b id="conversion"></b></div>
  </div>

  <!-- PANELS -->
  <div class="panel" onclick="toggle('issues')">
    <div class="panel-title">Issues</div>
    <ul id="issues" class="collapsed"></ul>
  </div>

  <div class="panel" onclick="toggle('fixes')">
    <div class="panel-title">Fixes</div>
    <ul id="fixes" class="collapsed"></ul>
  </div>

  <div class="panel" onclick="toggle('sections')">
    <div class="panel-title">Sections</div>
    <div id="sections" class="collapsed"></div>
  </div>

  <button id="export">Export Report</button>

</div>

<script src="popup.js"></script>
</body>
</html>
