<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LLM Readiness Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <div class="header">
    <h1>LLM Readiness</h1>
    <span class="badge">PRO</span>
  </div>

  <div class="score-wrapper">
    <div class="score-ring" id="scoreRing">
      <span id="score">--</span>
    </div>
    <p>Overall Score</p>
  </div>

  <div class="metrics">
    <div class="metric"><span>Markdown</span><b id="markdown"></b></div>
    <div class="metric"><span>Extractability</span><b id="extract"></b></div>
    <div class="metric"><span>Token</span><b id="token"></b></div>
    <div class="metric"><span>Conversion</span><b id="conversion"></b></div>
  </div>

  <div class="panel">
    <h3>Top Issues</h3>
    <ul id="issues"></ul>
  </div>

  <div class="panel">
    <h3>Quick Fixes</h3>
    <ul id="fixes"></ul>
  </div>

  <div class="panel">
    <h3>Section Analysis</h3>
    <div id="sections"></div>
  </div>

  <button id="export">Export Report</button>

</div>

<script src="popup.js"></script>
</body>
</html>
